bind_host: 0.0.0.0
bind_port: 3000 # Cổng WebUI của AdGuard Home (Trùng với adguard_port trong defaults.c)
auth_name: admin
auth_pass: "" # Để trống để người dùng tự thiết lập lần đầu qua WebUI

dns:
  bind_hosts:
    - 0.0.0.0
  port: 5353 # Chạy DNS Filter ở port 5353 để tránh xung đột trực tiếp với dnsmasq (port 53)
  statistics_interval: 1 # Lưu thống kê 1 ngày
  querylog_enabled: true
  cache_size: 4194304 # 4MB Cache DNS

# ĐƯỜNG DẪN QUAN TRỌNG: Đẩy toàn bộ dữ liệu ghi đè liên tục ra RAM (/tmp) để bảo vệ Flash
querylog_file_path: /tmp/querylog.json
stats_file_path: /tmp/stats.db
filters_db_path: /tmp/filters.db

filters:
  - id: 1
    enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt
    name: AdGuard Base filter
    
