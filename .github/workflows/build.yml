name: Build firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t padavan-builder .

    - name: Build Firmware inside Docker
      run: |
        docker run --rm -v ${{ github.workspace }}:/workdir padavan-builder /bin/bash -c "
          # 1. Tự tìm thư mục trunk
          TRUNK_DIR=$(find /workdir -maxdepth 2 -name 'trunk' | head -n 1)
          
          if [ -z '$TRUNK_DIR' ]; then
            echo 'Không tìm thấy thư mục trunk!'
            exit 1
          fi
          
          echo 'Đã tìm thấy trunk tại: $TRUNK_DIR'
          cd '$TRUNK_DIR'
          
          # 2. Copy config
          cp /workdir/build.config .config
          
          # 3. Build firmware
          chmod +x clear_tree.sh build_firmware.sh
          ./clear_tree.sh
          ./build_firmware.sh
        "

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Newifi-D2-Firmware
        path: |
          **/images/*.trx
          **/images/*.bin
          
