name: Build firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libtool-bin gperf python3-docutils autopoint gettext bison flex texinfo autoconf automake libgmp-dev libmpfr-dev libmpc-dev zlib1g-dev libncurses5-dev

      - name: Download & Prepare Toolchain
        run: |
          mkdir -p toolchain
          # Tải bộ toolchain đã build sẵn cho chip MT7621 (thay vì tự build từ source)
          wget -qO toolchain.tar.xz https://github.com/hanwckf/rt-n56u/releases/download/toolchain-mipsel/toolchain-mipsel.tar.xz
          tar -xJf toolchain.tar.xz -C toolchain
          # Đảm bảo tên thư mục là 'out' để script build của Padavan nhận diện được
          DIR_NAME=$(ls -d toolchain/*/ | head -n 1)
          mv "$DIR_NAME" toolchain/out

      - name: Build Firmware
        run: |
          # Copy file config của bạn
          cp build.config trunk/.config
          
          # Thực hiện build
          cd trunk
          ./clear_tree.sh
          ./build_firmware.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: Newifi-D2-Firmware
          path: trunk/images/*.trx
          
