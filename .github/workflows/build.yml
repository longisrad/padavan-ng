name: Build firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults: { run: { shell: bash } }
    steps:
    # 1. Kéo mã nguồn nilabsent mới nhất về máy chủ ảo
    - uses: actions/checkout@v4
      with:
        path: padavan-ng

    # 2. Tải chuỗi công cụ (Toolchain) cho chip MIPS
    - name: Download toolchain
      run: |
        wget -qO- "https://github.com/hadzhioglu/padavan-ng/releases/download/toolchain/toolchain-mipsel.tar.zst" | tar -C padavan-ng --zstd -xf -

    # 3. Kéo bộ giao diện (Themes) chất lượng cao về cài đặt
    - name: Install modern themes
      run: |
        git clone --depth 1 -b master https://github.com/hadzhioglu/padavan-themes themes
        # Ghi đè cấu hình giao diện mặc định sang giao diện phẳng mới
        cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed
        
        # Cài đặt thêm các gói giao diện phổ biến (tối, sáng, màu sắc tùy biến)
        for theme in dark light; do
          echo "Installing $theme theme"
          cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
        done

    # 4. Cấu hình file build và Biên dịch
    - name: Build firmware
      run: |
        # Lấy file config mẫu chuẩn của Newifi D2 từ kho nilabsent
        cp padavan-ng/trunk/configs/templates/newifi-d2.config padavan-ng/trunk/.config
        
        # Tự động bật AdGuard Home vào file cấu hình
        echo "CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=y" >> padavan-ng/trunk/.config
        
        cd padavan-ng/trunk
        ./clear_tree.sh
        ./build_firmware.sh

        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" \
                        -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
        [[ -n $FW_FILE_NAME ]] || { echo "Firmware file not found"; exit 1; }
        echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV

    # 5. Gom file ROM ra ngoài để chuẩn bị tải về
    - name: Prepare artifacts
      run: |
        cp "padavan-ng/trunk/images/$FW_FILE_NAME" .
        echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> $GITHUB_ENV

    # 6. Đẩy file lên mục Artifacts (Cổ vật) trên GitHub để bạn tải
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: padavan-ng_Newifi_D2_With_Themes_${{ env.BUILD_TIMESTAMP }}
        retention-days: 7
        path: |
          ${{ env.FW_FILE_NAME }}
          
