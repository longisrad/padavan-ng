name: Build firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults: { run: { shell: bash } }
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
    # 1. Kéo mã nguồn nilabsent về
    - uses: actions/checkout@v4
      with:
        path: padavan-ng

    # 2. Tự Build Toolchain (Đây là bước nilabsent yêu cầu)
    - name: Build Toolchain
      run: |
        cd padavan-ng/toolchain
        ./build_toolchain

    # 3. Cài đặt Themes (Giữ nguyên logic của bạn)
    - name: Install themes
      run: |
        git clone --depth 1 -b master https://github.com/hadzhioglu/padavan-themes themes
        cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed
        cp -r themes/dark-theme padavan-ng/trunk/user/www/n56u_ribbon_fixed
        cp -r themes/light-theme padavan-ng/trunk/user/www/n56u_ribbon_fixed

    # 4. Build Firmware (Nạp file build.config của bạn)
    - name: Build firmware
      run: |
        # Lấy file build.config của bạn
        cp padavan-ng/build.config padavan-ng/trunk/.config
        echo "CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=y" >> padavan-ng/trunk/.config
        
        cd padavan-ng/trunk
        ./clear_tree.sh
        ./build_firmware.sh

        # Tìm file .trx hoặc .bin
        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" \
                        -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
        echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV

    # 5. Lưu Artifacts
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Newifi-D2-Firmware
        path: padavan-ng/trunk/images/${{ env.FW_FILE_NAME }}
        
