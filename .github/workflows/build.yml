name: Build firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libtool-bin gperf python3-docutils autopoint gettext

      - name: Prepare Toolchain
        run: |
          mkdir -p toolchain
          wget -qO toolchain.tar.xz https://github.com/hanwckf/rt-n56u/releases/download/toolchain-mipsel/toolchain-mipsel.tar.xz
          tar -xJf toolchain.tar.xz -C toolchain
          
          # TỰ ĐỘNG TÌM THƯ MỤC CHỨA TOOLCHAIN và đổi tên thành 'out'
          # Tìm thư mục đầu tiên không phải là file trong toolchain/
          DIR_NAME=$(ls -d toolchain/*/ | head -n 1)
          mv "$DIR_NAME" toolchain/out
          echo "Toolchain đã được đặt tại: toolchain/out"

      - name: Build Firmware
        run: |
          cd trunk
          # Nạp file config của bạn
          cp ../build.config .config
          
          # Build
          chmod +x clear_tree.sh build_firmware.sh
          ./clear_tree.sh
          ./build_firmware.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: Newifi-D2-Firmware
          path: trunk/images/*.trx
          
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: Newifi-D2-Firmware
          path: trunk/images/*.trx
          
