name: Build firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Chúng ta tự build image từ Dockerfile có sẵn trong repo của bạn
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t padavan-builder .

    - name: Build Firmware inside Docker
      run: |
        # Chạy container và mount thư mục hiện tại vào trong
        docker run --rm -v ${{ github.workspace }}:/workdir padavan-builder /bin/bash -c "
          # Copy file config của bạn vào đúng chỗ
          cp /workdir/build.config /workdir/padavan-ng/trunk/.config
          
          # Di chuyển vào đúng thư mục mà Dockerfile đã clone sẵn
          cd /workdir/padavan-ng/trunk
          
          # Build
          ./clear_tree.sh
          ./build_firmware.sh
        "

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Newifi-D2-Firmware
        path: padavan-ng/trunk/images/*.trx
        
